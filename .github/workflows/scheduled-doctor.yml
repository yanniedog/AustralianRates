# Production triage: runs `npm run doctor` against live https://www.australianrates.com once per day
# in the wall-clock hour from Admin → Settings (`app_config` key `doctor_schedule`, JSON { hour, time_zone }).
# This workflow reads GET /api/home-loan-rates/doctor-schedule (~2 min cache). GitHub cron is UTC-only, so we
# trigger hourly and gate on the configured local hour.
#
# Secrets (repo Settings → Actions): `ADMIN_API_TOKEN` — same bearer as production API worker (bundle + logs gate).
#
# Manual run: Actions → this workflow → "Run workflow" (runs doctor immediately; no email).
#
# On failure: job summary + log artifact; see `doctor-failure-open-review-pr.yml` for the draft PR that
# re-runs Cloudflare Pages, Sourcery, and other PR checks.

name: 'Production health: scheduled npm run doctor (australianrates.com)'

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: bash

concurrency:
  group: scheduled-doctor
  cancel-in-progress: false

jobs:
  production_doctor:
    name: Live production doctor (API + Pages + bundle gate)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NPM_CONFIG_FUND: 'false'
      NPM_CONFIG_AUDIT: 'false'
    steps:
      - name: Gate — fetch schedule and match local wall hour (or always run on workflow_dispatch)
        id: gate
        env:
          DOCTOR_SCHEDULE_URL: https://www.australianrates.com/api/home-loan-rates/doctor-schedule
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Do not use curl --fail: Cloudflare may return 403 to GitHub runner IPs (curl exit 22).
          HTTP=$(curl -sS -w '%{http_code}' -o doctor-schedule.json "$DOCTOR_SCHEDULE_URL" || echo 000)
          if [[ "$HTTP" != 200 ]] || ! jq -e '(.hour | type == "number") and (.time_zone | type == "string")' doctor-schedule.json >/dev/null 2>&1; then
            echo "::warning::doctor-schedule unavailable or invalid (HTTP ${HTTP}); using default hour 19 Australia/Melbourne (same as API default)."
            printf '%s\n' '{"ok":true,"hour":19,"time_zone":"Australia/Melbourne"}' > doctor-schedule.json
          fi
          TARGET_HOUR=$(jq -r '.hour | tonumber' doctor-schedule.json)
          TZIANA=$(jq -r '.time_zone // "Australia/Melbourne"' doctor-schedule.json)
          echo "target_hour=$TARGET_HOUR" >> "$GITHUB_OUTPUT"
          echo "time_zone=$TZIANA" >> "$GITHUB_OUTPUT"
          H=$(TZ="$TZIANA" date +%H)
          H=$((10#$H))
          TARGET_HOUR=$((10#$TARGET_HOUR))
          echo "local_hour=$H" >> "$GITHUB_OUTPUT"
          if [[ "$H" -eq "$TARGET_HOUR" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=scheduled_hour_match" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=scheduled_hour_mismatch" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (scheduled — outside configured doctor hour)
        if: github.event_name == 'schedule' && steps.gate.outputs.should_run != 'true'
        run: |
          echo "Skipping doctor: ${{ steps.gate.outputs.time_zone }} local hour is ${{ steps.gate.outputs.local_hour }} (configured target hour ${{ steps.gate.outputs.target_hour }})."

      - name: Checkout repository (for npm run doctor scripts)
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: npm ci --prefer-offline

      - name: Run npm run doctor (production triage)
        id: doctor_run
        if: steps.gate.outputs.should_run == 'true'
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          # Cloudflare often returns 403 to github-hosted runner IPs; cron would false-fail. workflow_dispatch does not set this.
          DOCTOR_TOLERATE_CF_ACTIONS_RUNNER_BLOCK: ${{ github.event_name == 'schedule' && 'true' || '' }}
        run: |
          set -euo pipefail
          set -o pipefail
          npm run doctor 2>&1 | tee doctor-run.log

      - name: Report failure — job summary + annotation
        if: failure() && steps.gate.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          {
            echo "## Production doctor failed"
            echo ""
            echo "**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "**Ref:** \`${{ github.ref }}\` **SHA:** \`${{ github.sha }}\`"
            echo ""
            echo "### Last lines of doctor output"
            echo ""
            echo '```'
            tail -n 120 doctor-run.log 2>/dev/null || echo "(doctor-run.log missing)"
            echo '```'
            echo ""
            if [[ -f status-debug-bundle-latest.json ]]; then
              echo "### status-debug-bundle (remediation hints, capped)"
              echo ""
              echo '```json'
              jq -c '.remediation.hints[:12]' status-debug-bundle-latest.json 2>/dev/null || echo "(no hints)"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Production npm run doctor failed — see the Summary tab on this job and the uploaded artifact."

      - name: Upload doctor log artifact on failure
        if: failure() && steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: doctor-run-log-${{ github.run_id }}
          path: doctor-run.log
          if-no-files-found: ignore
