name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck API
        run: npm run typecheck:api

      - name: Typecheck repo scripts
        run: npm run typecheck:scripts

      - name: Build (assets, vendor bundle, prototype, site version)
        run: npm run build

      - name: Test archive worker
        run: npm run test:archive

      - name: Test API worker
        run: npm run test:api

      - name: API integration tests
        run: npm run test:integration -w workers/api
