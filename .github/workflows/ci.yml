name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate local public assets
        run: npm run check:public-assets

      - name: Typecheck API
        run: npm run typecheck:api

      - name: Typecheck scripts
        run: npm run typecheck:scripts

      - name: Test archive worker
        run: npm run test:archive

      - name: Test API worker
        run: npm run test:api

  api_integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API integration runtime tests
        run: npm run test:integration -w workers/api
