name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Only cancel superseded runs for pull requests; rapid pushes to main should not mark prior runs "cancelled".
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Three tsc runs are independent; parallel saves wall time vs serial (~2× on 2-core runners).
      - name: Typecheck (API, scripts, mobile-site-qa in parallel)
        run: |
          ec=0
          npm run typecheck:api & p1=$!
          npm run typecheck:scripts & p2=$!
          npm run typecheck:mobile-site-qa & p3=$!
          wait $p1 || ec=1
          wait $p2 || ec=1
          wait $p3 || ec=1
          exit $ec

      - name: Build (assets, vendor bundle, prototype, site version)
        run: npm run build

      # Archive uses vitest-pool-workers; API unit tests are plain Vitest — safe to overlap.
      - name: Test archive + API unit tests (parallel)
        run: |
          ec=0
          npm run test:archive & p1=$!
          npm run test:api & p2=$!
          wait $p1 || ec=1
          wait $p2 || ec=1
          exit $ec

      - name: API integration tests
        run: npm run test:integration -w workers/api
