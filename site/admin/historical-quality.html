<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Historical Quality | Admin | AustralianRates</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../foundation.css?v=d30e686e00">
    <link rel="stylesheet" href="../public-shell.css?v=5b0dd398e7">
    <link rel="stylesheet" href="admin-layout.css?v=677ab0f0ce">
    <link rel="stylesheet" href="admin-pages.css?v=5594c2f51b">
    <script src="../site-variant.js?v=dfb2d4fb27"></script>
    <script src="../theme.js?v=f42ffd8ec5"></script>
    <style>
        .historical-quality-table-wrap { overflow: auto; max-width: 100%; }
        .historical-quality-table { width: max-content; min-width: 100%; border-collapse: collapse; font-size: 0.73rem; }
        .historical-quality-table th, .historical-quality-table td { padding: 0.34rem 0.38rem; border-bottom: 1px solid var(--ar-line); text-align: left; vertical-align: middle; white-space: nowrap; }
        .historical-quality-table th { font-size: 0.67rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ar-text-soft); cursor: help; }
        .historical-quality-table thead th { position: sticky; top: 0; z-index: 1; background: var(--ar-surface); }
        .historical-quality-table .mono { font-family: "JetBrains Mono","SF Mono","Consolas","Monaco","ui-monospace",monospace; font-size: 0.88rem; }
        .historical-quality-cell-date { font-size: 0.82rem; font-weight: 700; }
        .historical-quality-cell-num { text-align: right; font-variant-numeric: tabular-nums; }
        .historical-quality-toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .historical-quality-toolbar input[type="date"] { min-width: 160px; }
        .historical-quality-toolbar-count { margin-left: auto; font-variant-numeric: tabular-nums; color: var(--ar-text-soft); }
        @media (max-width: 1180px) {
            .historical-quality-table { font-size: 0.69rem; }
            .historical-quality-table th, .historical-quality-table td { padding: 0.28rem 0.32rem; }
        }
    </style>
</head>
<body class="ar-admin">
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="site-header">
        <div class="site-header-inner">
            <h1 class="site-brand"><a href="/">AustralianRates</a></h1>
        </div>
    </header>
    <main class="admin-shell admin-shell--wide" id="main-content" tabindex="-1">
        <p class="admin-back"><a href="dashboard.html">Back to dashboard</a></p>
        <div class="admin-page-head">
            <p class="eyebrow">Historical quality</p>
            <h1>Historical quality</h1>
        </div>
        <div class="admin-card">
            <div class="historical-quality-toolbar">
                <label for="historical-quality-date">Date</label>
                <input type="date" id="historical-quality-date">
                <button type="button" class="primary" id="historical-quality-run-btn">Run</button>
                <button type="button" class="secondary" id="historical-quality-refresh-btn">Refresh</button>
                <span class="admin-status-line" id="historical-quality-status">loading</span>
                <span class="historical-quality-toolbar-count"><span id="historical-quality-count">0</span> days</span>
            </div>
        </div>
        <section class="admin-card">
            <h2>Daily grid</h2>
            <div class="historical-quality-table-wrap" id="historical-quality-table-wrap"></div>
        </section>
    </main>
    <script src="admin-portal.js?v=e6678ffa5b"></script>
    <script src="admin-sidebar.js?v=6114d7314a"></script>
    <script src="historical-quality-page.js?v=9c254c363d"></script>
</body>
</html>
