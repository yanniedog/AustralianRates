<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Logs | Admin | AustralianRates</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../foundation.css?v=5124c75">
    <link rel="stylesheet" href="../public-shell.css?v=5124c75">
    <link rel="stylesheet" href="admin-layout.css?v=5124c75">
    <link rel="stylesheet" href="admin-pages.css?v=5124c75">
    <script src="../theme.js?v=5124c75"></script>
</head>
<body class="ar-admin">
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="site-header">
        <div class="site-header-inner">
            <h1 class="site-brand"><a href="/">AustralianRates</a></h1>
        </div>
    </header>
    <main class="admin-shell admin-shell--narrow admin-logs" id="main-content" tabindex="-1">
        <p class="admin-back"><a href="dashboard.html">Back to dashboard</a></p>
        <div class="admin-page-head">
            <p class="eyebrow">Logs</p>
            <h1>Logs</h1>
            <p class="admin-subtitle">Download or clear server and client logs.</p>
        </div>
        <div class="admin-message" id="msg"></div>

        <section class="admin-card">
            <h2>System log</h2>
            <p class="admin-hint">Server-side global_log. JSONL includes full structured entries.</p>
            <div class="admin-log-actions log-actions">
                <button type="button" class="primary" id="download-system-jsonl-btn">Download system log (JSONL)</button>
                <button type="button" class="secondary" id="download-system-text-btn">Download system log (text)</button>
                <button type="button" class="danger" id="wipe-system-btn">Wipe system log</button>
            </div>
            <div class="log-stats" id="system-stats">Loading...</div>
        </section>

        <section class="admin-card">
            <h2>Client log</h2>
            <p class="admin-hint">In-browser session log for this tab.</p>
            <div class="admin-log-actions log-actions">
                <button type="button" class="primary" id="download-client-btn">Download client log</button>
                <button type="button" class="danger" id="wipe-client-btn">Wipe client log</button>
            </div>
            <div class="log-stats" id="client-stats"></div>
        </section>
    </main>
    <script src="admin-portal.js?v=5124c75"></script>
    <script src="admin-sidebar.js?v=5124c75"></script>
    <script src="../ui-icons.js?v=5124c75"></script>
    <script src="../frame.js?v=5124c75"></script>
    <script>
        (function () {
            if (!window.AR || !window.AR.AdminPortal || !window.AR.AdminPortal.guard()) return;

            var portal = window.AR.AdminPortal;
            var msgEl = document.getElementById('msg');
            var systemStatsEl = document.getElementById('system-stats');
            var clientStatsEl = document.getElementById('client-stats');

            function showMsg(text, isError) {
                msgEl.textContent = text;
                msgEl.className = 'admin-message visible ' + (isError ? 'error' : 'success');
            }

            function updateClientStats() {
                var entries = typeof window.getSessionLogEntries === 'function' ? window.getSessionLogEntries() : [];
                clientStatsEl.textContent = entries.length + ' entries in this tab';
            }

            function downloadSystemLog(format) {
                var normalizedFormat = (format === 'jsonl') ? 'jsonl' : 'text';
                var url = portal.apiBase() + '/admin/logs/system?limit=10000' + (normalizedFormat === 'jsonl' ? '&format=jsonl' : '');
                fetch(url, { headers: portal.authHeaders() })
                    .then(function (r) {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.text();
                    })
                    .then(function (text) {
                        var blob = new Blob([text], { type: (normalizedFormat === 'jsonl') ? 'application/x-ndjson;charset=utf-8' : 'text/plain;charset=utf-8' });
                        var a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = (normalizedFormat === 'jsonl')
                            ? 'australianrates-system-log.jsonl'
                            : 'australianrates-system-log.txt';
                        a.click();
                        URL.revokeObjectURL(a.href);
                        showMsg('System log downloaded (' + normalizedFormat.toUpperCase() + ').', false);
                    })
                    .catch(function (e) {
                        showMsg(e && e.message ? e.message : 'Download failed', true);
                    });
            }

            function wipeSystemLog() {
                if (!confirm('Delete all entries from the system log (global_log)? This cannot be undone.')) return;
                portal.fetchAdmin('/logs/system/wipe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                })
                    .then(function (r) {
                        return r.text().then(function (text) {
                            var d = null;
                            try { d = text ? JSON.parse(text) : null; } catch (e) { /* ignore */ }
                            return { ok: r.ok, status: r.status, statusText: r.statusText, data: d, raw: text };
                        });
                    })
                    .then(function (out) {
                        if (out.ok && out.data && out.data.ok) {
                            showMsg('System log wiped. ' + (out.data.deleted || 0) + ' entries deleted.', false);
                            loadSystemStats();
                            if (typeof window.refreshSystemLogCount === 'function') window.refreshSystemLogCount();
                        } else if (out.data && out.data.error && out.data.error.message) {
                            showMsg(out.data.error.message, true);
                        } else if (out.status) {
                            showMsg('Wipe failed: HTTP ' + out.status + (out.statusText ? ' ' + out.statusText : ''), true);
                        } else {
                            showMsg('Wipe failed', true);
                        }
                    })
                    .catch(function (e) {
                        showMsg(e && e.message ? e.message : 'Request failed', true);
                    });
            }

            function loadSystemStats() {
                systemStatsEl.textContent = 'Loading...';
                portal.fetchAdmin('/logs/system/stats', { cache: 'no-store' })
                    .then(function (r) {
                        if (!r.ok) {
                            systemStatsEl.textContent = 'Stats unavailable (HTTP ' + r.status + ')';
                            return null;
                        }
                        return r.json();
                    })
                    .then(function (d) {
                        if (d == null) return;
                        if (d.ok && typeof d.count === 'number') {
                            var latest = d.latest_ts ? '; latest ' + d.latest_ts : '';
                            systemStatsEl.textContent = d.count + ' entries' + latest;
                        } else {
                            systemStatsEl.textContent = 'Could not load stats';
                        }
                    })
                    .catch(function (e) {
                        systemStatsEl.textContent = e && e.message ? 'Stats: ' + e.message : 'Could not load stats';
                    });
            }

            function downloadClientLog() {
                var entries = typeof window.getSessionLogEntries === 'function' ? window.getSessionLogEntries() : [];
                var lines = entries.map(function (e) {
                    var parts = [e.ts, '[' + (e.level || 'info').toUpperCase() + ']', e.message];
                    if (e.detail != null) parts.push(typeof e.detail === 'object' ? JSON.stringify(e.detail) : String(e.detail));
                    return parts.join(' ');
                });
                var text = '# AustralianRates Client Log (' + entries.length + ' entries)\n# Downloaded at ' + new Date().toISOString() + '\n\n' + lines.join('\n') + '\n';
                var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'australianrates-client-log.txt';
                a.click();
                URL.revokeObjectURL(a.href);
                showMsg('Client log downloaded.', false);
            }

            function wipeClientLog() {
                if (typeof window.clearSessionLog === 'function') {
                    window.clearSessionLog();
                    updateClientStats();
                    showMsg('Client log wiped for this tab.', false);
                } else {
                    showMsg('Client log not available.', true);
                }
            }

            document.getElementById('download-system-jsonl-btn').addEventListener('click', function () { downloadSystemLog('jsonl'); });
            document.getElementById('download-system-text-btn').addEventListener('click', function () { downloadSystemLog('text'); });
            document.getElementById('wipe-system-btn').addEventListener('click', wipeSystemLog);
            document.getElementById('download-client-btn').addEventListener('click', downloadClientLog);
            document.getElementById('wipe-client-btn').addEventListener('click', wipeClientLog);

            loadSystemStats();
            updateClientStats();
            var systemStatsIntervalId = setInterval(loadSystemStats, 30000);
            var clientStatsIntervalId = setInterval(updateClientStats, 10000);
            document.body.addEventListener('ar:admin-page-unload', function () {
                if (systemStatsIntervalId) clearInterval(systemStatsIntervalId);
                if (clientStatsIntervalId) clearInterval(clientStatsIntervalId);
            });
        })();
    </script>
</body>
</html>
