<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Admin Login | AustralianRates</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../foundation.css?v=ea68bf2">
    <link rel="stylesheet" href="../public-shell.css?v=ea68bf2">
    <link rel="stylesheet" href="admin-layout.css?v=ea68bf2">
    <link rel="stylesheet" href="admin-pages.css?v=ea68bf2">
    <script src="../theme.js?v=ea68bf2"></script>
</head>
<body class="ar-admin">
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="site-header">
        <div class="site-header-inner">
            <h1 class="site-brand"><a href="/">AustralianRates</a></h1>
        </div>
    </header>
    <main class="admin-shell admin-shell--narrow admin-login admin-login-card" id="main-content" tabindex="-1">
        <div class="admin-page-head">
            <p class="eyebrow">Admin access</p>
            <h1>Admin login</h1>
            <p class="admin-subtitle">Enter the admin API token.</p>
        </div>
        <form id="login-form" action="#" method="post">
            <label for="admin-token">API token</label>
            <input id="admin-token" name="token" type="password" placeholder="Paste admin token" autocomplete="off" required>
            <button type="submit" id="login-btn">Log in</button>
        </form>
        <div class="admin-message error" id="login-error" role="alert"></div>
    </main>
    <script src="admin-portal.js?v=ea68bf2"></script>
    <script src="../ui-icons.js?v=ea68bf2"></script>
    <script src="../frame.js?v=ea68bf2"></script>
    <script>
        (function () {
            var form = document.getElementById('login-form');
            var btn = document.getElementById('login-btn');
            var errEl = document.getElementById('login-error');
            var apiBase = window.AR && window.AR.AdminPortal ? window.AR.AdminPortal.apiBase() : (window.location.origin + '/api/home-loan-rates');

            function loginErrorMessage(reason) {
                if (reason === 'invalid_bearer_token') return 'Login failed. The token was not accepted.';
                if (reason === 'admin_token_not_configured') return 'Admin login is unavailable right now. Please contact the site operator.';
                if (reason === 'admin_token_or_access_jwt_required') return 'Login failed. Enter a valid admin token.';
                return 'Login failed. Check your token and try again.';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var token = (document.getElementById('admin-token').value || '').trim();
                if (!token) {
                    errEl.textContent = 'Please enter a token.';
                    errEl.classList.add('visible');
                    return;
                }
                errEl.classList.remove('visible');
                errEl.textContent = '';
                btn.disabled = true;
                btn.textContent = 'Checking...';

                fetch(apiBase + '/admin/runs?limit=1', { headers: { Authorization: 'Bearer ' + token } })
                    .then(function (r) {
                        if (r.ok) {
                            window.AR.AdminPortal.setToken(token);
                            window.location.href = 'dashboard.html';
                            return;
                        }
                        return r.json().then(function (d) {
                            var reason = (d && d.error && d.error.details && d.error.details.reason) ? d.error.details.reason : '';
                            errEl.textContent = loginErrorMessage(reason);
                            errEl.classList.add('visible');
                        }).catch(function () {
                            errEl.textContent = 'Login failed. Check your token.';
                            errEl.classList.add('visible');
                        });
                    })
                    .catch(function () {
                        errEl.textContent = 'Network error. Check your connection and try again.';
                        errEl.classList.add('visible');
                    })
                    .finally(function () {
                        btn.disabled = false;
                        btn.textContent = 'Log in';
                    });
            });
        })();
    </script>
</body>
</html>
