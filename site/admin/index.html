<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Admin Login | AustralianRates</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../foundation.css?v=7ecd7b4">
    <link rel="stylesheet" href="../public-shell.css?v=7ecd7b4">
    <link rel="stylesheet" href="admin-layout.css?v=7ecd7b4">
    <link rel="stylesheet" href="admin-pages.css?v=7ecd7b4">
    <script src="../theme.js?v=7ecd7b4"></script>
</head>
<body class="ar-admin">
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header class="site-header">
        <div class="site-header-inner">
            <h1 class="site-brand"><a href="/">AustralianRates</a></h1>
        </div>
    </header>
    <main class="admin-shell admin-shell--narrow admin-login admin-login-card" id="main-content" tabindex="-1">
        <div class="admin-page-head">
            <p class="eyebrow">Admin access</p>
            <h1>Admin login</h1>
            <p class="admin-subtitle">Enter the admin API token.</p>
        </div>
        <form id="login-form" action="#" method="post">
            <label for="admin-token">API token</label>
            <input id="admin-token" name="token" type="password" placeholder="Paste admin token" autocomplete="off" required>
            <button type="submit" id="login-btn">Log in</button>
        </form>
        <div class="admin-message error" id="login-error" role="alert"></div>
    </main>
    <script src="admin-portal.js?v=7ecd7b4"></script>
    <script src="../ui-icons.js?v=7ecd7b4"></script>
    <script src="../frame.js?v=7ecd7b4"></script>
    <script>
        (function () {
            // #region agent log
            try {
                fetch('http://127.0.0.1:7387/ingest/df577db5-7ea2-489d-bc70-cbe35041c6be', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': 'e952bc' }, body: JSON.stringify({ sessionId: 'e952bc', location: 'index.html:ready', message: 'login page ready', data: { pathname: window.location.pathname, hasAR: !!(window.AR), hasAdminPortal: !!(window.AR && window.AR.AdminPortal) }, hypothesisId: 'A_H2', timestamp: Date.now() }) }).catch(function () {});
            } catch (e) {}
            // #endregion
            var form = document.getElementById('login-form');
            var btn = document.getElementById('login-btn');
            var errEl = document.getElementById('login-error');
            var apiBase = window.AR && window.AR.AdminPortal ? window.AR.AdminPortal.apiBase() : (window.location.origin + '/api/home-loan-rates');

            function loginErrorMessage(reason) {
                if (reason === 'invalid_bearer_token') return 'Login failed. The token was not accepted.';
                if (reason === 'admin_token_not_configured') return 'Admin login is unavailable right now. Please contact the site operator.';
                if (reason === 'admin_token_or_access_jwt_required') return 'Login failed. Enter a valid admin token.';
                return 'Login failed. Check your token and try again.';
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                var token = (document.getElementById('admin-token').value || '').trim();
                if (!token) {
                    errEl.textContent = 'Please enter a token.';
                    errEl.classList.add('visible');
                    return;
                }
                // #region agent log
                try {
                    fetch('http://127.0.0.1:7387/ingest/df577db5-7ea2-489d-bc70-cbe35041c6be', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': 'e952bc' }, body: JSON.stringify({ sessionId: 'e952bc', location: 'index.html:submit', message: 'login form submit', data: { apiBase: apiBase, tokenLength: token.length, hasAdminPortal: !!(window.AR && window.AR.AdminPortal) }, hypothesisId: 'H4', timestamp: Date.now() }) }).catch(function () {});
                } catch (err) {}
                // #endregion
                errEl.classList.remove('visible');
                errEl.textContent = '';
                btn.disabled = true;
                btn.textContent = 'Checking...';

                var timeoutMs = 15000;
                var ac = new AbortController();
                var timeoutId = setTimeout(function () { ac.abort(); }, timeoutMs);

                fetch(apiBase + '/admin/auth-check', {
                    headers: { Authorization: 'Bearer ' + token },
                    signal: ac.signal
                })
                    .then(function (r) {
                        // #region agent log
                        try {
                            fetch('http://127.0.0.1:7387/ingest/df577db5-7ea2-489d-bc70-cbe35041c6be', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': 'e952bc' }, body: JSON.stringify({ sessionId: 'e952bc', location: 'index.html:fetchDone', message: 'login fetch response', data: { ok: r.ok, status: r.status, hasAdminPortal: !!(window.AR && window.AR.AdminPortal) }, hypothesisId: 'H4_H5', timestamp: Date.now() }) }).catch(function () {});
                        } catch (err) {}
                        // #endregion
                        if (r.ok) {
                            window.AR.AdminPortal.setToken(token);
                            window.location.href = 'dashboard.html';
                            return;
                        }
                        return r.json().then(function (d) {
                            var reason = (d && d.error && d.error.details && d.error.details.reason) ? d.error.details.reason : '';
                            errEl.textContent = loginErrorMessage(reason);
                            errEl.classList.add('visible');
                        }).catch(function () {
                            errEl.textContent = 'Login failed. Check your token.';
                            errEl.classList.add('visible');
                        });
                    })
                    .catch(function (err) {
                        // #region agent log
                        try {
                            fetch('http://127.0.0.1:7387/ingest/df577db5-7ea2-489d-bc70-cbe35041c6be', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': 'e952bc' }, body: JSON.stringify({ sessionId: 'e952bc', location: 'index.html:fetchCatch', message: 'login fetch failed', data: { name: err && err.name }, hypothesisId: 'H4', timestamp: Date.now() }) }).catch(function () {});
                        } catch (e) {}
                        // #endregion
                        if (err && err.name === 'AbortError') {
                            errEl.textContent = 'Request timed out. Check your connection and try again.';
                        } else {
                            errEl.textContent = 'Network error. Check your connection and try again.';
                        }
                        errEl.classList.add('visible');
                    })
                    .finally(function () {
                        clearTimeout(timeoutId);
                        btn.disabled = false;
                        btn.textContent = 'Log in';
                    });
            });
        })();
    </script>
</body>
</html>
