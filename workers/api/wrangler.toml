name = "australianrates-api"
main = "src/index.ts"
compatibility_date = "2026-02-20"

# Run Worker closer to D1 / upstream where measured latency wins (fetch handlers only).
[placement]
mode = "smart"

[[routes]]
pattern = "www.australianrates.com/api/home-loan-rates/*"
zone_name = "australianrates.com"

[[routes]]
pattern = "australianrates.com/api/home-loan-rates/*"
zone_name = "australianrates.com"

[[routes]]
pattern = "www.australianrates.com/api/savings-rates/*"
zone_name = "australianrates.com"

[[routes]]
pattern = "australianrates.com/api/savings-rates/*"
zone_name = "australianrates.com"

[[routes]]
pattern = "www.australianrates.com/api/term-deposit-rates/*"
zone_name = "australianrates.com"

[[routes]]
pattern = "australianrates.com/api/term-deposit-rates/*"
zone_name = "australianrates.com"

[[routes]]
pattern = "www.australianrates.com/api/economic-data/*"
zone_name = "australianrates.com"

[[routes]]
pattern = "australianrates.com/api/economic-data/*"
zone_name = "australianrates.com"

[[d1_databases]]
binding = "DB"
database_name = "australianrates_api"
database_id = "de6d4315-686b-4022-b080-956ca3819976"

[[r2_buckets]]
binding = "RAW_BUCKET"
bucket_name = "australianrates-raw"

[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "australianrates-ingest"

[[kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "6b34fb3979c3480ab74ae80c65749ae2"
preview_id = "004d7a0f3e26440f9aeee889d27e48ca"

[[kv_namespaces]]
binding = "CHART_CACHE_KV"
id = "f4df70d373d54e08af64efd2ec148551"
preview_id = "3fc214de39e447f8a72d0eb46c19bf70"

[[queues.consumers]]
queue = "australianrates-ingest"
max_batch_size = 50
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "australianrates-ingest-dlq"

[[durable_objects.bindings]]
name = "RUN_LOCK_DO"
class_name = "RunLockDO"

[[durable_objects.bindings]]
name = "HISTORICAL_QUALITY_AUDIT_DO"
class_name = "HistoricalQualityAuditDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RunLockDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["HistoricalQualityAuditDO"]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
# Cost-control schedule: one daily CDR ingest at Melbourne 06:00 plus one post-ingest public package refresh.
# The UTC pair covers AEST/AEDT; the handler gates on MELBOURNE_DAILY_INGEST_HOURS=6.
# Heavy maintenance, health, integrity, backup, historical-quality, and chart-cache jobs remain manual/admin-only.
crons = ["0 19,20 * * *", "0 23 * * *"]

[vars]
WORKER_VERSION = "phase1"
PUBLIC_API_BASE_PATH = "/api/home-loan-rates"
MELBOURNE_TIMEZONE = "Australia/Melbourne"
MELBOURNE_TARGET_HOUR = "6"
MELBOURNE_SECOND_INGEST_HOUR = "18"
MELBOURNE_DAILY_INGEST_HOURS = "6"
MANUAL_RUN_COOLDOWN_SECONDS = "60"
LOCK_TTL_SECONDS = "7200"
MAX_QUEUE_ATTEMPTS = "3"
MAX_PRODUCTS_PER_LENDER = "20000"
FEATURE_SCHEDULED_INGEST_AUDITS_ENABLED = "false"
FEATURE_SCHEDULED_PRODUCT_CLASSIFICATION_AUDIT_ENABLED = "false"
D1_DAILY_READ_LIMIT = "166666666"
D1_DAILY_WRITE_LIMIT = "1000000"
D1_NONESSENTIAL_DISABLE_FRACTION = "0.10"
D1_EMERGENCY_MINIMUM_WRITES = "true"
FEATURE_PROSPECTIVE_ENABLED = "true"
FEATURE_BACKFILL_ENABLED = "true"
AUTO_BACKFILL_DAILY_QUEUE_CAP = "16"
PUBLIC_HISTORICAL_MAX_RANGE_DAYS = "30"
ADMIN_HISTORICAL_MAX_RANGE_DAYS = "365"
HISTORICAL_TASK_CLAIM_TTL_SECONDS = "900"
HISTORICAL_MAX_BATCH_ROWS = "50"
PUBLIC_HISTORICAL_COOLDOWN_SECONDS = "300"
FEATURE_PUBLIC_TRIGGER_RUN_ENABLED = "false"
FEATURE_PUBLIC_HISTORICAL_PULL_ENABLED = "false"
FEATURE_PUBLIC_EXPORT_JOB_ENABLED = "false"
FEATURE_QUEUE_IDEMPOTENCY_ENABLED = "true"
IDEMPOTENCY_TTL_SECONDS = "604800"
IDEMPOTENCY_LEASE_SECONDS = "900"
MAX_REPLAY_ATTEMPTS = "2"
REPLAY_BASE_DELAY_SECONDS = "900"
CF_ACCESS_TEAM_DOMAIN = ""
CF_ACCESS_AUD = ""
CLOUDFLARE_ACCOUNT_ID = "f3250f7113cfd8c7f747a09f942ca6d0"
CLOUDFLARE_BILLING_CYCLE_START_DAY = "21"

# Set secrets via Wrangler:
# wrangler secret put ADMIN_API_TOKEN
# wrangler secret put CLOUDFLARE_GRAPHQL_API_TOKEN

[env.test]
name = "australianrates-api-test"

[[env.test.d1_databases]]
