id = "11111111111111111111111111111111"
preview_id = "11111111111111111111111111111111"

[[env.test.kv_namespaces]]
binding = "CHART_CACHE_KV"
id = "22222222222222222222222222222222"
preview_id = "22222222222222222222222222222222"

[[env.test.queues.consumers]]
queue = "australianrates-ingest-test"
max_batch_size = 50
